<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Retention</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --orange: #d29922;
  --red: #f85149;
  --purple: #bc8cff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}

/* Layout */
.app { max-width: 960px; margin: 0 auto; padding: 16px; }

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}

header h1 { font-size: 20px; font-weight: 600; }

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border-radius: 8px;
  padding: 4px;
}

.tab {
  padding: 8px 16px;
  border: none;
  background: none;
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.15s;
}

.tab:hover { color: var(--text); background: var(--surface2); }
.tab.active { color: var(--text); background: var(--accent); }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* Cards */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin: 20px 0;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  text-align: center;
}

.stat-card .number {
  font-size: 32px;
  font-weight: 700;
  line-height: 1;
}

.stat-card .label {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stat-card.due .number { color: var(--orange); }
.stat-card.mastered .number { color: var(--green); }
.stat-card.learning .number { color: var(--accent); }

/* Pipeline */
.pipeline {
  display: flex;
  gap: 8px;
  margin: 20px 0;
  flex-wrap: wrap;
}

.pipeline-stage {
  flex: 1;
  min-width: 100px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  text-align: center;
}

.pipeline-stage .count { font-size: 24px; font-weight: 700; }
.pipeline-stage .name { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }

/* Review */
.review-container { max-width: 640px; margin: 0 auto; }

.flashcard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px;
  margin: 24px 0;
  min-height: 200px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.flashcard .paper-tag {
  font-size: 11px;
  color: var(--accent);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.flashcard .card-type {
  display: inline-block;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--surface2);
  color: var(--text-dim);
  margin-bottom: 16px;
}

.flashcard .question {
  font-size: 20px;
  font-weight: 600;
  line-height: 1.4;
}

.flashcard .answer {
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  font-size: 16px;
  color: var(--text);
  line-height: 1.6;
}

.flashcard .answer.hidden { display: none; }

.reveal-btn {
  display: block;
  width: 100%;
  padding: 14px;
  margin-top: 16px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.15s;
}

.reveal-btn:hover { background: var(--border); }

.rating-buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 16px;
}

.rating-btn {
  padding: 12px 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: transform 0.1s, opacity 0.1s;
}

.rating-btn:hover { transform: scale(1.03); }
.rating-btn:active { transform: scale(0.97); }

.rating-btn.forgot { background: var(--red); color: white; }
.rating-btn.hard { background: var(--orange); color: white; }
.rating-btn.good { background: var(--green); color: white; }
.rating-btn.easy { background: var(--accent); color: white; }

.rating-btn .interval {
  display: block;
  font-size: 10px;
  font-weight: 400;
  opacity: 0.8;
  margin-top: 2px;
}

.rating-buttons.hidden { display: none; }

/* Audio controls */
.audio-controls {
  display: flex;
  gap: 6px;
  margin-top: 12px;
}

.audio-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-dim);
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}

.audio-btn:hover { color: var(--text); border-color: var(--accent); }
.audio-btn.speaking { color: var(--accent); border-color: var(--accent); }

.audio-toggle {
  position: absolute;
  top: 16px;
  right: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-dim);
}

.audio-toggle label { cursor: pointer; }

.toggle-switch {
  position: relative;
  width: 36px;
  height: 20px;
  background: var(--surface2);
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s;
  border: 1px solid var(--border);
}

.toggle-switch.on { background: var(--accent); border-color: var(--accent); }

.toggle-switch::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 14px;
  height: 14px;
  background: white;
  border-radius: 50%;
  transition: transform 0.2s;
}

.toggle-switch.on::after { transform: translateX(16px); }

/* Progress bar */
.progress-bar {
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  margin: 16px 0;
  overflow: hidden;
}

.progress-bar .fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s;
}

.review-progress {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--text-dim);
  font-size: 13px;
}

/* Session summary */
.session-summary {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px;
  text-align: center;
}

.session-summary h2 { margin-bottom: 16px; }

.summary-stats {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin: 20px 0;
}

.summary-stat .value { font-size: 28px; font-weight: 700; }
.summary-stat .label { font-size: 12px; color: var(--text-dim); }

/* Papers table */
.paper-list { margin-top: 16px; }

.paper-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 8px;
  transition: border-color 0.15s;
}

.paper-item:hover { border-color: var(--accent); }

.paper-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}

.paper-title {
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

.paper-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}

.badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
}

.badge.status-discovered { background: #1f2937; color: var(--text-dim); }
.badge.status-queued { background: #1e293b; color: var(--accent); }
.badge.status-unread { background: #1e293b; color: var(--accent); }
.badge.status-reading { background: #422006; color: var(--orange); }
.badge.status-read { background: #052e16; color: var(--green); }
.badge.status-reviewing { background: #2e1065; color: var(--purple); }
.badge.status-mastered { background: #052e16; color: var(--green); }

.badge.cards { background: var(--surface2); color: var(--text-dim); }
.badge.cards.has-due { background: #422006; color: var(--orange); }

.paper-details {
  display: none;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.paper-details.open { display: block; }

.paper-info { font-size: 13px; color: var(--text-dim); margin: 4px 0; }
.paper-tags { display: flex; gap: 4px; flex-wrap: wrap; margin: 8px 0; }
.paper-tags .tag {
  font-size: 11px;
  padding: 1px 6px;
  background: var(--surface2);
  border-radius: 4px;
  color: var(--text-dim);
}

.paper-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.15s;
}

.btn:hover { background: var(--border); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
.btn.primary:hover { opacity: 0.9; }

.status-select {
  padding: 4px 8px;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
}

/* Start review */
.start-review {
  text-align: center;
  padding: 48px 24px;
}

.start-review h2 { font-size: 24px; margin-bottom: 8px; }
.start-review p { color: var(--text-dim); margin-bottom: 24px; }

.start-btn {
  padding: 14px 40px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}

.start-btn:hover { opacity: 0.9; }
.start-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Radio player */
.radio-player {
  max-width: 640px;
  margin: 0 auto;
}

.radio-now-playing {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px;
  text-align: center;
  margin: 24px 0;
}

.radio-now-playing .segment-type {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  margin-bottom: 8px;
}

.radio-now-playing .segment-label {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 16px;
  line-height: 1.4;
}

.radio-now-playing .segment-text {
  font-size: 14px;
  color: var(--text-dim);
  line-height: 1.6;
  max-height: 120px;
  overflow-y: auto;
  text-align: left;
  margin: 16px 0;
  padding: 12px;
  background: var(--surface2);
  border-radius: 8px;
}

.radio-controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 16px;
  margin: 20px 0;
}

.radio-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.radio-btn:hover { border-color: var(--accent); }
.radio-btn.play { width: 64px; height: 64px; font-size: 24px; background: var(--accent); border-color: var(--accent); }
.radio-btn.play:hover { opacity: 0.9; }

.radio-progress {
  font-size: 13px;
  color: var(--text-dim);
  margin: 12px 0;
}

.radio-playlist {
  margin-top: 20px;
}

.radio-playlist-item {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: background 0.1s;
}

.radio-playlist-item:hover { background: var(--surface2); }
.radio-playlist-item.active { background: var(--surface2); border-left: 3px solid var(--accent); }
.radio-playlist-item .type-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--text-dim);
}

.radio-playlist-item .type-badge.review { background: #422006; color: var(--orange); }
.radio-playlist-item .type-badge.answer { background: #052e16; color: var(--green); }
.radio-playlist-item .type-badge.summary { background: #1e293b; color: var(--accent); }
.radio-playlist-item .type-badge.discovery { background: #2e1065; color: var(--purple); }
.radio-playlist-item .type-badge.reinforcement { background: #052e16; color: var(--green); }

.speed-control {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-dim);
}

.speed-control select {
  padding: 4px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 4px;
  font-size: 12px;
}

/* Discover tab */
.discover-add-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}

.discover-add-bar input {
  flex: 1;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  font-size: 14px;
}

.discover-add-bar select {
  padding: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  font-size: 13px;
}

.discover-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 10px;
}

.discover-card .title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.discover-card .meta { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
.discover-card .abstract { font-size: 13px; color: var(--text-dim); line-height: 1.5; margin-bottom: 12px; max-height: 60px; overflow: hidden; }
.discover-card .abstract.expanded { max-height: none; }
.discover-card .reason { font-size: 11px; color: var(--purple); margin-bottom: 8px; }

.discover-actions {
  display: flex;
  gap: 6px;
  align-items: center;
}

.vote-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-dim);
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}

.vote-btn:hover { border-color: var(--accent); color: var(--text); }
.vote-btn.good { border-color: var(--green); color: var(--green); }
.vote-btn.bad { border-color: var(--red); color: var(--red); }
.vote-btn.selected { font-weight: 700; }
.vote-btn.good.selected { background: var(--green); color: white; }
.vote-btn.bad.selected { background: var(--red); color: white; }

.priority-select {
  padding: 4px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  font-size: 12px;
}

.topic-list {
  margin-top: 20px;
}

.topic-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 6px;
  font-size: 14px;
}

.topic-item .topic-priority {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
}

.topic-item .topic-priority.important { background: #422006; color: var(--orange); }
.topic-item .topic-priority.relevant { background: #1e293b; color: var(--accent); }
.topic-item .topic-priority.hobby { background: #052e16; color: var(--green); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 48px;
  color: var(--text-dim);
}

/* Study view */
.study-view { max-width: 720px; margin: 0 auto; }

.study-header {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 16px;
}

.study-header h2 { font-size: 20px; margin-bottom: 8px; }
.study-header .authors { font-size: 13px; color: var(--text-dim); margin-bottom: 12px; }
.study-header .abstract { font-size: 14px; line-height: 1.6; color: var(--text); }

.study-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 12px;
}

.study-section h3 {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 12px;
}

.study-card {
  padding: 14px;
  background: var(--surface2);
  border-radius: 8px;
  margin-bottom: 8px;
}

.study-card .q { font-weight: 600; margin-bottom: 8px; }
.study-card .a { color: var(--text-dim); line-height: 1.5; }

.study-rating {
  display: flex;
  gap: 8px;
  margin: 16px 0;
  justify-content: center;
}

.study-rating .rate-btn {
  padding: 10px 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}

.study-rating .rate-btn:hover { border-color: var(--accent); }
.study-rating .rate-btn.selected { background: var(--accent); border-color: var(--accent); color: white; }
.study-rating .rate-btn.unrelated { border-color: var(--red); }
.study-rating .rate-btn.unrelated:hover { background: var(--red); color: white; }

/* Explorations */
.exploration-thread {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 12px;
  overflow: hidden;
}

.exploration-header {
  padding: 14px 16px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.1s;
}

.exploration-header:hover { background: var(--surface2); }
.exploration-header .title { font-weight: 600; font-size: 15px; }
.exploration-header .meta { font-size: 12px; color: var(--text-dim); }

.exploration-body { padding: 0 16px 16px; }

.exploration-qa {
  border-left: 3px solid var(--accent);
  padding: 12px 16px;
  margin: 12px 0;
  background: var(--surface2);
  border-radius: 0 8px 8px 0;
}

.exploration-qa .question {
  font-weight: 600;
  font-size: 15px;
  margin-bottom: 10px;
  color: var(--accent);
}

.exploration-qa .answer {
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
}

.exploration-qa .papers-used {
  margin-top: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.exploration-qa .paper-chip {
  font-size: 11px;
  padding: 3px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-dim);
}

.exploration-qa .paper-chip.discovered {
  border-color: var(--green);
  color: var(--green);
}

.follow-up-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}

.follow-up-btn {
  padding: 6px 12px;
  border: 1px dashed var(--border);
  background: none;
  color: var(--text-dim);
  border-radius: 16px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}

.follow-up-btn:hover { border-color: var(--accent); color: var(--text); border-style: solid; }

.exploration-cards {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

.exploration-cards .mini-card {
  padding: 8px 12px;
  background: var(--surface);
  border-radius: 6px;
  margin: 4px 0;
  font-size: 13px;
}

.exploration-cards .mini-card .q { font-weight: 500; }
.exploration-cards .mini-card .a { color: var(--text-dim); margin-top: 2px; }

.explore-ask-box {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.explore-ask-box input {
  flex: 1;
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  font-size: 13px;
}

.uncategorized-section {
  margin-top: 24px;
}

.uncategorized-header {
  font-size: 14px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
  cursor: pointer;
}

/* Loading */
.loading { text-align: center; padding: 32px; color: var(--text-dim); }

/* Filter bar */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.filter-bar select, .filter-bar input {
  padding: 6px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  font-size: 13px;
}

.filter-bar input { flex: 1; min-width: 200px; }

/* Toast notifications */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 12px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  z-index: 100;
  animation: slideIn 0.2s ease-out;
}

.toast.success { border-color: var(--green); }
.toast.error { border-color: var(--red); }

@keyframes slideIn {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>Knowledge Retention</h1>
    <div class="tabs">
      <button class="tab active" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="review">Review</button>
      <button class="tab" data-tab="explore">Explore</button>
      <button class="tab" data-tab="radio">Radio</button>
    </div>
  </header>

  <!-- Dashboard -->
  <div id="dashboard" class="tab-content active">
    <div class="stat-grid" id="stats-grid"></div>
    <h3 style="margin: 24px 0 8px; font-size: 14px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px;">Reading Pipeline</h3>
    <div class="pipeline" id="pipeline"></div>
    <div style="margin-top: 24px;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3 style="font-size: 14px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px;">Due Today</h3>
        <button class="btn primary" onclick="startReview()" id="dash-review-btn">Start Review</button>
      </div>
      <div id="due-preview" style="margin-top: 12px;"></div>
    </div>
  </div>

  <!-- Review -->
  <div id="review" class="tab-content">
    <div class="review-container" id="review-area"></div>
  </div>

  <!-- Explore -->
  <div id="explore" class="tab-content">
    <div class="discover-add-bar">
      <input type="text" id="explore-input" placeholder="Ask a question, paste a URL, or describe what you want to learn..." onkeydown="if(event.key==='Enter')submitExplore()">
      <button class="btn primary" onclick="submitExplore()">Explore</button>
    </div>
    <div id="explore-content"></div>
  </div>

  <!-- Radio -->
  <div id="radio" class="tab-content">
    <div class="radio-player" id="radio-area">
      <div class="start-review">
        <h2>Knowledge Radio</h2>
        <p>Listen to your knowledge while doing other things</p>
        <button class="start-btn" onclick="loadRadio()">Load Playlist</button>
      </div>
    </div>
  </div>

  <!-- Papers -->
</div>

<script>
const API = '';

// State
let dashboardData = null;
let papersData = null;
let reviewSession = null;
let autoReadQuestion = localStorage.getItem('autoReadQuestion') === 'true';
let autoReadAnswer = localStorage.getItem('autoReadAnswer') === 'true';

// ---- Text-to-Speech (edge-tts via server) ----

const tts = {
  audio: null,
  speaking: false,
  blobCache: {},  // text -> blob URL, in-memory cache for instant playback

  async fetchAudio(text) {
    if (this.blobCache[text]) return this.blobCache[text];
    try {
      const res = await fetch(API + '/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      if (!res.ok) return null;
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      this.blobCache[text] = url;
      return url;
    } catch (e) {
      console.error('TTS fetch error:', e);
      return null;
    }
  },

  async speak(text) {
    this.stop();
    const url = await this.fetchAudio(text);
    if (!url) return;
    this.audio = new Audio(url);
    this.audio.onended = () => { this.speaking = false; };
    this.audio.onerror = () => { this.speaking = false; };
    this.speaking = true;
    this.audio.play();
  },

  stop() {
    if (this.audio) {
      this.audio.pause();
      this.audio.currentTime = 0;
      this.audio = null;
    }
    this.speaking = false;
  },

  toggle(text) {
    if (this.speaking) {
      this.stop();
    } else {
      this.speak(text);
    }
  }
};

function prefetchAllTTS() {
  if (!reviewSession) return;
  // Fire off all TTS requests in parallel — they'll be cached
  for (const card of reviewSession.cards) {
    tts.fetchAudio(card.question);
    tts.fetchAudio(card.answer);
  }
}

// ---- API Calls ----

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  return res.json();
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ---- Tabs ----

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab).classList.add('active');

    // Load data on tab switch
    if (tab.dataset.tab === 'dashboard') loadDashboard();
    if (tab.dataset.tab === 'review') showReviewStart();
    if (tab.dataset.tab === 'explore') loadExplore();
    if (tab.dataset.tab === 'radio' && !radioState.playlist) loadRadio();
  });
});

// ---- Dashboard ----

async function loadDashboard() {
  const el = document.getElementById('stats-grid');
  el.innerHTML = '<div class="loading">Loading...</div>';

  dashboardData = await api('/api/dashboard');
  const s = dashboardData.stats;

  el.innerHTML = `
    <div class="stat-card due">
      <div class="number">${s.due_today}</div>
      <div class="label">Due Today</div>
    </div>
    <div class="stat-card learning">
      <div class="number">${s.upcoming_7d}</div>
      <div class="label">Next 7 Days</div>
    </div>
    <div class="stat-card">
      <div class="number">${s.total}</div>
      <div class="label">Total Cards</div>
    </div>
    <div class="stat-card mastered">
      <div class="number">${s.mastered}</div>
      <div class="label">Mastered</div>
    </div>
    <div class="stat-card">
      <div class="number">${dashboardData.total_papers}</div>
      <div class="label">Papers</div>
    </div>
    <div class="stat-card">
      <div class="number">${dashboardData.papers_with_cards}</div>
      <div class="label">With Cards</div>
    </div>
  `;

  // Pipeline
  const pipeline = document.getElementById('pipeline');
  const stages = ['discovered', 'queued', 'unread', 'reading', 'read', 'reviewing', 'mastered'];
  const p = dashboardData.pipeline;
  pipeline.innerHTML = stages.map(stage => `
    <div class="pipeline-stage">
      <div class="count">${p[stage] || 0}</div>
      <div class="name">${stage}</div>
    </div>
  `).join('');

  // Due cards preview
  const preview = document.getElementById('due-preview');
  const due = dashboardData.due_cards;
  const btn = document.getElementById('dash-review-btn');

  if (due.length === 0) {
    preview.innerHTML = '<div class="empty-state">No cards due today. Great job!</div>';
    btn.disabled = true;
    btn.textContent = 'All caught up';
  } else {
    btn.disabled = false;
    btn.textContent = `Start Review (${due.length})`;

    // Group by paper
    const byPaper = {};
    due.forEach(c => {
      if (!byPaper[c.paper_id]) byPaper[c.paper_id] = { title: c.paper_title, cards: [] };
      byPaper[c.paper_id].cards.push(c);
    });

    preview.innerHTML = Object.entries(byPaper).map(([pid, data]) => `
      <div class="paper-item" style="padding: 12px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span style="font-weight: 500; font-size: 14px;">${data.title}</span>
          <span class="badge cards has-due">${data.cards.length} cards due</span>
        </div>
      </div>
    `).join('');
  }
}

// ---- Review Session ----

function startReview() {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector('[data-tab="review"]').classList.add('active');
  document.getElementById('review').classList.add('active');

  reviewSession = {
    cards: [...(dashboardData?.due_cards || [])],
    current: 0,
    results: [],
    startTime: Date.now(),
    prefetched: new Set(),
  };

  if (reviewSession.cards.length === 0) {
    showReviewStart();
    return;
  }

  // Pre-generate TTS for all cards in background
  prefetchAllTTS();
  showCard();
}

function showReviewStart() {
  const area = document.getElementById('review-area');
  const count = dashboardData?.stats?.due_today || '...';

  if (!dashboardData) {
    api('/api/dashboard').then(data => {
      dashboardData = data;
      showReviewStart();
    });
    area.innerHTML = '<div class="loading">Loading...</div>';
    return;
  }

  if (dashboardData.stats.due_today === 0) {
    area.innerHTML = `
      <div class="start-review">
        <h2>All caught up!</h2>
        <p>No cards due for review right now. Check back later.</p>
      </div>`;
    return;
  }

  area.innerHTML = `
    <div class="start-review">
      <h2>${count} cards due</h2>
      <p>Review your knowledge cards with active recall</p>
      <button class="start-btn" onclick="startReview()">Start Review</button>
    </div>`;
}

function showCard() {
  const area = document.getElementById('review-area');
  const s = reviewSession;

  if (s.current >= s.cards.length) {
    showSessionSummary();
    return;
  }

  const card = s.cards[s.current];
  const progress = ((s.current) / s.cards.length * 100).toFixed(0);

  area.innerHTML = `
    <div class="review-progress">
      <span>Card ${s.current + 1} of ${s.cards.length}</span>
      <div style="display: flex; align-items: center; gap: 12px;">
        <span>${card.type}</span>
        <div style="display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dim);">
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
            <span class="toggle-switch ${autoReadQuestion ? 'on' : ''}" onclick="toggleAutoRead('question', this)"></span>
            Auto-read Q
          </label>
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
            <span class="toggle-switch ${autoReadAnswer ? 'on' : ''}" onclick="toggleAutoRead('answer', this)"></span>
            Auto-read A
          </label>
        </div>
      </div>
    </div>
    <div class="progress-bar"><div class="fill" style="width: ${progress}%"></div></div>

    <div class="flashcard" style="position:relative;">
      <div class="paper-tag">${card.paper_title}</div>
      <div class="card-type">${card.type} &middot; difficulty ${card.difficulty || '?'}</div>
      <div class="question">${card.question}</div>
      <div class="audio-controls">
        <button class="audio-btn" onclick="tts.toggle(document.querySelector('.question').textContent)" title="Read question aloud">
          &#9654; Question
        </button>
      </div>
      <div class="answer hidden" id="answer-text">${card.answer}</div>
      <div class="audio-controls hidden" id="answer-audio">
        <button class="audio-btn" onclick="tts.toggle(document.getElementById('answer-text').textContent)" title="Read answer aloud">
          &#9654; Answer
        </button>
      </div>
    </div>

    <button class="reveal-btn" id="reveal-btn" onclick="revealAnswer()">
      Show Answer
    </button>

    <div class="rating-buttons hidden" id="rating-btns">
      <button class="rating-btn forgot" onclick="rateCard(1)">
        Forgot
        <span class="interval">1d</span>
      </button>
      <button class="rating-btn hard" onclick="rateCard(3)">
        Hard
        <span class="interval">${estimateInterval(card, 3)}</span>
      </button>
      <button class="rating-btn good" onclick="rateCard(4)">
        Good
        <span class="interval">${estimateInterval(card, 4)}</span>
      </button>
      <button class="rating-btn easy" onclick="rateCard(5)">
        Easy
        <span class="interval">${estimateInterval(card, 5)}</span>
      </button>
    </div>
  `;

  // Auto-read question if enabled
  if (autoReadQuestion) {
    tts.speak(card.question);
  }
}

function estimateInterval(card, quality) {
  let ef = card.ease_factor || 2.5;
  let interval = card.interval_days || 0;
  let reps = card.repetitions || 0;

  let newEf = ef + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
  newEf = Math.max(1.3, newEf);

  let newInterval;
  if (quality < 3) {
    newInterval = 1;
  } else {
    reps += 1;
    if (reps === 1) newInterval = 1;
    else if (reps === 2) newInterval = 6;
    else newInterval = Math.round(interval * newEf);
  }

  if (newInterval === 1) return '1d';
  if (newInterval < 7) return `${newInterval}d`;
  if (newInterval < 30) return `${Math.round(newInterval / 7)}w`;
  return `${Math.round(newInterval / 30)}mo`;
}

function revealAnswer() {
  tts.stop();
  document.getElementById('answer-text').classList.remove('hidden');
  document.getElementById('answer-audio').classList.remove('hidden');
  document.getElementById('reveal-btn').style.display = 'none';
  document.getElementById('rating-btns').classList.remove('hidden');

  if (autoReadAnswer) {
    const answerText = document.getElementById('answer-text').textContent;
    tts.speak(answerText);
  }
}

function toggleAutoRead(type, el) {
  if (type === 'question') {
    autoReadQuestion = !autoReadQuestion;
    localStorage.setItem('autoReadQuestion', autoReadQuestion);
  } else {
    autoReadAnswer = !autoReadAnswer;
    localStorage.setItem('autoReadAnswer', autoReadAnswer);
  }
  el.classList.toggle('on');
}

async function rateCard(quality) {
  tts.stop();
  const card = reviewSession.cards[reviewSession.current];

  // Submit to server
  const result = await api('/api/review/answer', {
    method: 'POST',
    body: JSON.stringify({ card_id: card.id, quality }),
  });

  reviewSession.results.push({ card_id: card.id, quality, ...result });
  reviewSession.current++;

  showCard();
}

function showSessionSummary() {
  const area = document.getElementById('review-area');
  const s = reviewSession;
  const elapsed = Math.round((Date.now() - s.startTime) / 1000);
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;

  const forgot = s.results.filter(r => r.quality === 1).length;
  const hard = s.results.filter(r => r.quality === 3).length;
  const good = s.results.filter(r => r.quality === 4).length;
  const easy = s.results.filter(r => r.quality === 5).length;

  area.innerHTML = `
    <div class="session-summary">
      <h2>Session Complete!</h2>
      <p style="color: var(--text-dim);">${s.cards.length} cards reviewed in ${mins}m ${secs}s</p>

      <div class="summary-stats">
        <div class="summary-stat">
          <div class="value" style="color: var(--red);">${forgot}</div>
          <div class="label">Forgot</div>
        </div>
        <div class="summary-stat">
          <div class="value" style="color: var(--orange);">${hard}</div>
          <div class="label">Hard</div>
        </div>
        <div class="summary-stat">
          <div class="value" style="color: var(--green);">${good}</div>
          <div class="label">Good</div>
        </div>
        <div class="summary-stat">
          <div class="value" style="color: var(--accent);">${easy}</div>
          <div class="label">Easy</div>
        </div>
      </div>

      <button class="btn primary" onclick="loadDashboard(); document.querySelectorAll('.tab')[0].click();" style="margin-top: 16px;">
        Back to Dashboard
      </button>
    </div>
  `;

  // Refresh dashboard data
  dashboardData = null;
}

// ---- Papers ----

function renderPapers() {
  if (!papersData) return;
  const statusEl = document.getElementById('status-filter');
  const groupEl = document.getElementById('group-by');
  if (!statusEl || !groupEl) return;

  const statusFilter = statusEl.value;
  const groupBy = groupEl.value;
  const searchQuery = document.getElementById('search-input').value.toLowerCase();

  let papers = papersData.papers;

  if (statusFilter) {
    papers = papers.filter(p => p.status === statusFilter);
  }

  if (searchQuery) {
    papers = papers.filter(p =>
      p.title.toLowerCase().includes(searchQuery) ||
      (p.tags || []).some(t => t.includes(searchQuery)) ||
      (p.categories || []).some(c => c.toLowerCase().includes(searchQuery)) ||
      (p.discovery_reason || '').toLowerCase().includes(searchQuery)
    );
  }

  const el = document.getElementById('paper-list');

  if (papers.length === 0) {
    el.innerHTML = '<div class="empty-state">No papers found</div>';
    return;
  }

  // Grouping
  if (groupBy !== 'none') {
    const groups = {};
    papers.forEach(p => {
      let key;
      if (groupBy === 'status') key = p.status || 'unknown';
      else if (groupBy === 'category') key = (p.categories || [])[0] || 'Uncategorized';
      else if (groupBy === 'source') key = p.source_type || 'unknown';
      else key = 'all';
      if (!groups[key]) groups[key] = [];
      groups[key].push(p);
    });

    el.innerHTML = Object.entries(groups).sort().map(([group, gPapers]) => `
      <h3 style="font-size: 14px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px;">
        ${group} (${gPapers.length})
      </h3>
      ${gPapers.map(renderPaperItem).join('')}
    `).join('');
  } else {
    el.innerHTML = papers.map(renderPaperItem).join('');
  }
}

function renderPaperItem(p) {
  const isStudied = ['read', 'reviewing', 'mastered'].includes(p.status);
  return `
    <div class="paper-item" id="paper-${p.id}">
      <div class="paper-header">
        <span class="paper-title" onclick="togglePaperDetails('${p.id}')">${p.title}</span>
        <div class="paper-meta">
          ${p.due_count > 0 ? `<span class="badge cards has-due">${p.due_count} due</span>` : ''}
          ${p.card_count > 0 ? `<span class="badge cards">${p.card_count} cards</span>` : ''}
          <span class="badge status-${p.status}">${p.status}</span>
        </div>
      </div>
      <div class="paper-details" id="details-${p.id}">
        <div class="paper-info">${(p.authors || []).join(', ')} · ${p.year || '?'}${p.citation_count ? ` · ${p.citation_count} cites` : ''}</div>
        ${p.discovery_reason ? `<div style="font-size: 11px; color: var(--purple); margin: 4px 0;">${p.discovery_reason}</div>` : ''}
        <div class="paper-tags">
          ${(p.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
          ${(p.categories || []).map(c => `<span class="tag">${c}</span>`).join('')}
        </div>
        <div class="paper-actions">
          ${!isStudied ? `<button class="btn primary" onclick="startStudy('${p.id}')">Study</button>` : ''}
          <select class="status-select" onchange="updatePaperStatus('${p.id}', this.value)">
            ${['discovered','queued','unread','reading','read','reviewing','mastered'].map(s =>
              `<option value="${s}" ${s === p.status ? 'selected' : ''}>${s}</option>`
            ).join('')}
          </select>
          <button class="btn" onclick="generateCards('${p.id}')">
            ${p.card_count > 0 ? 'Regen Cards' : 'Gen Cards'}
          </button>
          <button class="vote-btn bad" onclick="if(confirm('Delete this paper?')) removePaper('${p.id}')" style="padding: 4px 8px;">x</button>
        </div>
      </div>
    </div>
  `;
}

function togglePaperDetails(id) {
  const el = document.getElementById(`details-${id}`);
  el.classList.toggle('open');
}

async function updatePaperStatus(paperId, status) {
  await api(`/api/papers/${paperId}/status`, {
    method: 'POST',
    body: JSON.stringify({ status }),
  });
  toast(`Status updated to ${status}`);
  // Update local data
  const paper = papersData.papers.find(p => p.id === paperId);
  if (paper) paper.status = status;
}

async function generateCards(paperId) {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Generating...';

  try {
    const result = await api(`/api/cards/generate/${paperId}`, { method: 'POST' });
    if (result.ok) {
      toast(`Generated ${result.cards_generated} cards`);
      loadPapers(); // Refresh
    } else {
      toast(result.error || 'Generation failed', 'error');
    }
  } catch (e) {
    toast('Generation failed: ' + e.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Generate Cards';
}

// ---- Keyboard shortcuts ----

document.addEventListener('keydown', (e) => {
  if (!reviewSession || reviewSession.current >= reviewSession.cards.length) return;

  const answerVisible = !document.getElementById('answer-text')?.classList.contains('hidden');

  if (e.code === 'Space' && !answerVisible) {
    e.preventDefault();
    revealAnswer();
  } else if (answerVisible) {
    if (e.key === '1') rateCard(1);
    else if (e.key === '2') rateCard(3);
    else if (e.key === '3') rateCard(4);
    else if (e.key === '4') rateCard(5);
  }
});

// ---- Explore Tab ----

let explorationsData = null;
let studyingPaper = null;

async function loadExplore() {
  const el = document.getElementById('explore-content');
  el.innerHTML = '<div class="loading">Loading...</div>';

  const [expResp, papersResp] = await Promise.all([
    api('/api/explorations'),
    api('/api/papers'),
  ]);

  explorationsData = expResp.explorations || [];
  papersData = papersResp;

  renderExploreContent();
}

function renderExploreContent() {
  const el = document.getElementById('explore-content');

  let html = '';

  // Explorations
  if (explorationsData.length > 0) {
    html += explorationsData.map(renderExploration).join('');
  } else {
    html += '<div class="empty-state" style="padding: 24px;">Ask a question to start exploring. Try: "How is LLaMA different from DeepSeek and Qwen?"</div>';
  }

  // Library section (replaces Papers tab)
  const totalPapers = papersData ? papersData.papers.length : '...';
  html += `
    <div class="uncategorized-section">
      <div class="uncategorized-header" onclick="toggleLibrary()">
        Library (${totalPapers} papers) ▾
      </div>
      <div id="library-section" style="display: none;">
        <div class="filter-bar">
          <select id="status-filter" onchange="renderPapers()">
            <option value="">All statuses</option>
            <option value="discovered">Discovered</option>
            <option value="queued">Queued</option>
            <option value="unread">Unread</option>
            <option value="reading">Reading</option>
            <option value="read">Read (Studied)</option>
            <option value="reviewing">Reviewing</option>
            <option value="mastered">Mastered</option>
          </select>
          <select id="group-by" onchange="renderPapers()">
            <option value="category">Group by category</option>
            <option value="status">Group by status</option>
            <option value="none">No grouping</option>
            <option value="source">Group by source</option>
          </select>
          <input type="text" id="search-input" placeholder="Search papers..." oninput="renderPapers()">
        </div>
        <div id="paper-list" class="paper-list"></div>
      </div>
    </div>
  `;

  el.innerHTML = html;
  if (papersData) renderPapers();
}

function toggleLibrary() {
  const section = document.getElementById('library-section');
  if (!section) return;
  const isHidden = section.style.display === 'none';
  section.style.display = isHidden ? '' : 'none';
  if (isHidden && papersData) renderPapers();
}

function renderExploration(exp) {
  const qCount = exp.questions.length;
  const paperCount = new Set(exp.questions.flatMap(q => [...(q.papers_used || []), ...(q.papers_discovered || []).map(d => d.id)])).size;

  return `
    <div class="exploration-thread" id="exp-${exp.id}">
      <div class="exploration-header" onclick="toggleExploration('${exp.id}')">
        <span class="title">${exp.title}</span>
        <span class="meta">${qCount} Q&A · ${paperCount} papers · ${exp.created_at?.split(' ')[0] || ''}</span>
      </div>
      <div class="exploration-body" id="expbody-${exp.id}" style="display: none;">
        ${exp.questions.map(renderQuestionNode).join('')}

        <div class="explore-ask-box">
          <input type="text" placeholder="Ask a follow-up question..." id="followup-${exp.id}" onkeydown="if(event.key==='Enter')askFollowUp('${exp.id}')">
          <button class="btn primary" onclick="askFollowUp('${exp.id}')">Ask</button>
          <button class="vote-btn bad" onclick="if(confirm('Delete this exploration?')){deleteExploration('${exp.id}')}" title="Delete">x</button>
        </div>
      </div>
    </div>
  `;
}

function renderQuestionNode(q) {
  return `
    <div class="exploration-qa">
      <div class="question">${q.text}</div>
      <div class="answer">${q.answer}</div>

      <div class="audio-controls" style="margin-top: 8px;">
        <button class="audio-btn" onclick="tts.toggle('${q.answer.replace(/'/g, "\\'").replace(/\n/g, " ").substring(0, 500)}')" style="font-size: 11px;">&#9654; Listen</button>
      </div>

      ${(q.papers_used || []).length > 0 || (q.papers_discovered || []).length > 0 ? `
        <div class="papers-used">
          ${(q.papers_used || []).map(pid => `<span class="paper-chip" title="${pid}">${pid.substring(0, 35)}...</span>`).join('')}
          ${(q.papers_discovered || []).map(d => `<span class="paper-chip discovered" title="Newly discovered">${d.title?.substring(0, 30) || d.id}...</span>`).join('')}
        </div>
      ` : ''}

      ${(q.follow_ups || []).length > 0 ? `
        <div class="follow-up-btns">
          ${q.follow_ups.map(fu => `<button class="follow-up-btn" onclick="askFromFollowUp(this, '${fu.replace(/'/g, "\\'")}')">${fu}</button>`).join('')}
        </div>
      ` : ''}

      ${(q.cards || []).length > 0 ? `
        <div class="exploration-cards">
          ${q.cards.map(c => `
            <div class="mini-card">
              <div class="q">Q: ${c.question}</div>
              <div class="a">A: ${c.answer}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}
    </div>
  `;
}

function toggleExploration(expId) {
  const body = document.getElementById(`expbody-${expId}`);
  body.style.display = body.style.display === 'none' ? '' : 'none';
}

async function submitExplore() {
  const input = document.getElementById('explore-input');
  const text = input.value.trim();
  if (!text) return;

  // Check if it's a URL
  if (text.startsWith('http')) {
    const result = await api('/api/papers/add-url', {
      method: 'POST',
      body: JSON.stringify({ url: text }),
    });
    if (result.ok) {
      toast(`Paper added: ${result.title || 'OK'}`);
      input.value = '';
      loadExplore();
    } else {
      toast(result.error || 'Failed', 'error');
    }
    return;
  }

  // It's a question — create new exploration
  input.disabled = true;
  input.value = 'Thinking...';

  const result = await api('/api/explorations', {
    method: 'POST',
    body: JSON.stringify({ question: text }),
  });

  input.disabled = false;
  input.value = '';

  if (result.ok) {
    toast('Exploration created');
    loadExplore();
    // Auto-expand the new exploration
    setTimeout(() => {
      const body = document.getElementById(`expbody-${result.exploration.id}`);
      if (body) body.style.display = '';
    }, 100);
  } else {
    toast(result.error || 'Failed', 'error');
  }
}

async function askFollowUp(expId) {
  const input = document.getElementById(`followup-${expId}`);
  const question = input.value.trim();
  if (!question) return;

  input.disabled = true;
  input.value = 'Thinking...';

  const result = await api('/api/explorations/ask', {
    method: 'POST',
    body: JSON.stringify({ exploration_id: expId, question }),
  });

  input.disabled = false;
  input.value = '';

  if (result.ok) {
    loadExplore();
    setTimeout(() => {
      const body = document.getElementById(`expbody-${expId}`);
      if (body) body.style.display = '';
    }, 100);
  } else {
    toast(result.error || 'Failed', 'error');
  }
}

function askFromFollowUp(btn, question) {
  // Find the parent exploration
  const thread = btn.closest('.exploration-thread');
  if (!thread) return;
  const expId = thread.id.replace('exp-', '');
  const input = document.getElementById(`followup-${expId}`);
  if (input) {
    input.value = question;
    askFollowUp(expId);
  }
}

async function deleteExploration(expId) {
  await api(`/api/explorations/${expId}/delete`, { method: 'POST' });
  loadExplore();
}

// Keep startStudy and related functions for the study flow
async function startStudy(paperId) {
  // Switch to the explore tab content area for study view
  const el = document.getElementById('explore-content');
  el.innerHTML = '<div class="loading">Loading study session...</div>';

  const paperResp = await api(`/api/papers/${paperId}`);
  if (!paperResp.cards || paperResp.cards?.cards?.length === 0) {
    el.innerHTML = '<div class="loading">Generating knowledge cards... (this takes ~30s)</div>';
    await api(`/api/cards/generate/${paperId}`, { method: 'POST' });
  }

  const study = await api(`/api/study/${paperId}`);
  studyingPaper = study;
  renderStudyView(el, study);
}

function renderStudyView(el, study) {
  const p = study.paper;
  const cards = study.cards || [];
  const connections = study.connections || [];

  el.innerHTML = `
    <div class="study-view">
      <button class="btn" onclick="exitStudy()" style="margin-bottom: 12px;">&larr; Back to papers</button>

      <div class="study-header">
        <h2>${p.title}</h2>
        <div class="authors">${(p.authors || []).join(', ')} · ${p.year || '?'}
          ${p.citation_count ? ` · ${p.citation_count} citations` : ''}</div>
        ${p.url ? `<a href="${p.url}" target="_blank" style="color: var(--accent); font-size: 13px;">Open paper &rarr;</a>` : ''}
        <div class="abstract" style="margin-top: 12px;">${p.abstract || p.summary || 'No abstract available.'}</div>

        <div class="audio-controls" style="margin-top: 12px;">
          <button class="audio-btn" onclick="tts.toggle(document.querySelector('.study-header .abstract').textContent)">&#9654; Listen to summary</button>
        </div>
      </div>

      <div class="study-rating">
        <button class="rate-btn" onclick="ratePaperDuring('${p.id}', 'important', this)">Important</button>
        <button class="rate-btn" onclick="ratePaperDuring('${p.id}', 'relevant', this)">Relevant</button>
        <button class="rate-btn" onclick="ratePaperDuring('${p.id}', 'hobby', this)">Hobby</button>
        <button class="rate-btn unrelated" onclick="ratePaperDuring('${p.id}', 'unrelated', this)">Unrelated</button>
      </div>

      ${cards.length > 0 ? `
        <div class="study-section">
          <h3>Key Concepts (${cards.length} cards)</h3>
          ${cards.map((c, i) => `
            <div class="study-card">
              <div class="q">${i + 1}. ${c.question}</div>
              <div class="a">${c.answer}</div>
              <div class="audio-controls" style="margin-top: 6px;">
                <button class="audio-btn" onclick="tts.toggle('${c.question.replace(/'/g, "\\'")} ... ${c.answer.replace(/'/g, "\\'")}')" style="font-size: 11px;">&#9654; Listen</button>
              </div>
            </div>
          `).join('')}
        </div>
      ` : '<div class="empty-state">No cards generated yet.</div>'}

      ${connections.length > 0 ? `
        <div class="study-section">
          <h3>Related Papers</h3>
          ${connections.map(c => `
            <div style="padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px;">
              <span style="font-weight: 500;">${c.title}</span>
              <div style="color: var(--text-dim); font-size: 11px;">${(c.reasons || []).join(', ')}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}

      <div style="text-align: center; margin: 24px 0;">
        <button class="start-btn" onclick="completeStudy('${p.id}')">
          Mark as Studied — Add to Review Rotation
        </button>
      </div>
    </div>
  `;
}

function ratePaperDuring(paperId, rating, btn) {
  if (rating === 'unrelated') {
    if (confirm('Remove this paper from your library?')) {
      removePaper(paperId);
      exitStudy();
    }
    return;
  }
  // Highlight selected button
  document.querySelectorAll('.study-rating .rate-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  api('/api/feedback', {
    method: 'POST',
    body: JSON.stringify({ paper_id: paperId, priority: rating }),
  });
  toast(`Rated as ${rating}`);
}

async function completeStudy(paperId) {
  const result = await api(`/api/study/${paperId}/complete`, { method: 'POST' });
  if (result.ok) {
    toast(`Paper studied! ${result.cards_activated} cards now in review rotation.`);
    exitStudy();
  } else {
    toast(result.error || 'Failed', 'error');
  }
}

function exitStudy() {
  studyingPaper = null;
  tts.stop();
  loadExplore();
}

// renderStudyView, ratePaperDuring, completeStudy, exitStudy — keep these as-is but
// change exitStudy to call loadExplore() instead of loadDiscover()

async function removePaper(paperId) {
  await api(`/api/papers/${paperId}/delete`, { method: 'POST' });
  toast('Paper removed');
  loadExplore();
}

// ---- Knowledge Radio ----

const radioState = {
  playlist: null,
  current: -1,
  playing: false,
  speed: 1.0,
};

async function loadRadio() {
  const area = document.getElementById('radio-area');
  area.innerHTML = '<div class="loading">Loading playlist...</div>';

  const data = await api('/api/radio/playlist');
  radioState.playlist = data.segments || [];
  radioState.current = -1;
  radioState.playing = false;

  if (radioState.playlist.length === 0) {
    area.innerHTML = '<div class="empty-state">No content for radio. Add papers and generate cards first.</div>';
    return;
  }

  renderRadio();
}

function renderRadio() {
  const area = document.getElementById('radio-area');
  const s = radioState;
  const segment = s.current >= 0 ? s.playlist[s.current] : null;

  area.innerHTML = `
    <div class="radio-now-playing">
      ${segment ? `
        <div class="segment-type">${segment.type}</div>
        <div class="segment-label">${segment.label}</div>
        <div class="segment-text">${segment.text}</div>
      ` : `
        <div class="segment-label">Ready to play</div>
        <p style="color: var(--text-dim);">${s.playlist.length} segments — review cards, summaries, discoveries</p>
      `}
    </div>

    <div class="radio-controls">
      <button class="radio-btn" onclick="radioSkip(-1)" title="Previous">&#9664;&#9664;</button>
      <button class="radio-btn play" onclick="radioToggle()" title="${s.playing ? 'Pause' : 'Play'}">
        ${s.playing ? '&#9646;&#9646;' : '&#9654;'}
      </button>
      <button class="radio-btn" onclick="radioSkip(1)" title="Next">&#9654;&#9654;</button>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center;">
      <div class="radio-progress">
        ${s.current >= 0 ? `${s.current + 1} / ${s.playlist.length}` : `${s.playlist.length} segments`}
      </div>
      <div class="speed-control">
        Speed:
        <select onchange="radioSetSpeed(this.value)">
          <option value="0.8" ${s.speed===0.8?'selected':''}>0.8x</option>
          <option value="1" ${s.speed===1?'selected':''}>1x</option>
          <option value="1.2" ${s.speed===1.2?'selected':''}>1.2x</option>
          <option value="1.5" ${s.speed===1.5?'selected':''}>1.5x</option>
        </select>
      </div>
    </div>

    <div class="progress-bar"><div class="fill" style="width: ${s.current >= 0 ? ((s.current + 1) / s.playlist.length * 100) : 0}%"></div></div>

    <div class="radio-playlist" style="max-height: 300px; overflow-y: auto;">
      ${s.playlist.map((seg, i) => `
        <div class="radio-playlist-item ${i === s.current ? 'active' : ''}" onclick="radioJump(${i})">
          <span>${seg.label}</span>
          <span class="type-badge ${seg.type}">${seg.type}</span>
        </div>
      `).join('')}
    </div>
  `;
}

async function radioToggle() {
  if (radioState.playing) {
    radioState.playing = false;
    tts.stop();
    renderRadio();
  } else {
    radioState.playing = true;
    if (radioState.current < 0) radioState.current = 0;
    renderRadio();
    await radioPlayCurrent();
  }
}

async function radioPlayCurrent() {
  const s = radioState;
  if (!s.playing || s.current >= s.playlist.length) {
    s.playing = false;
    renderRadio();
    return;
  }

  renderRadio();
  const segment = s.playlist[s.current];

  // Prefetch next few segments
  for (let i = s.current + 1; i < Math.min(s.current + 4, s.playlist.length); i++) {
    tts.fetchAudio(s.playlist[i].text);
  }

  // Play current
  const url = await tts.fetchAudio(segment.text);
  if (!url || !s.playing) return;

  const audio = new Audio(url);
  audio.playbackRate = s.speed;
  tts.audio = audio;
  tts.speaking = true;

  await new Promise(resolve => {
    audio.onended = resolve;
    audio.onerror = resolve;
    audio.play().catch(resolve);
  });

  tts.speaking = false;

  if (!s.playing) return;

  // Pause between segments
  const pauseMs = (segment.pause_after || 2) * 1000;
  await new Promise(resolve => {
    const timer = setTimeout(resolve, pauseMs);
    // Store so we can cancel on stop
    radioState._pauseTimer = timer;
  });

  if (!s.playing) return;

  // Next segment
  s.current++;
  await radioPlayCurrent();
}

function radioSkip(direction) {
  const s = radioState;
  clearTimeout(s._pauseTimer);
  tts.stop();
  s.current = Math.max(0, Math.min(s.playlist.length - 1, s.current + direction));
  renderRadio();
  if (s.playing) radioPlayCurrent();
}

function radioJump(index) {
  const s = radioState;
  clearTimeout(s._pauseTimer);
  tts.stop();
  s.current = index;
  renderRadio();
  if (s.playing) radioPlayCurrent();
}

function radioSetSpeed(val) {
  radioState.speed = parseFloat(val);
  if (tts.audio) tts.audio.playbackRate = radioState.speed;
}

// ---- Init ----
loadDashboard();
</script>
